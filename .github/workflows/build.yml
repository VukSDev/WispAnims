name: Rebuild site

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'   # prevent infinite loop when this action commits index.html

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate index.html
        run: node gen.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes" || (git commit -m "Auto-rebuild index.html" && git push)
